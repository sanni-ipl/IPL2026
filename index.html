<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPredict Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>CricPredict Application</h1>
    </header>
    <main>
        <section id="registration">
            <h2>Registration</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="country">Country:</label>
                <input type="text" id="country" name="country" required>
                <label for="team">Select your IPL team:</label>
                <select id="team" name="team" required>
                    <option value="Chennai Super Kings">Chennai Super Kings</option>
                    <option value="Delhi Capitals">Delhi Capitals</option>
                    <option value="Gujarat Titans">Gujarat Titans</option>
                    <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
                    <option value="Lucknow Super Giants">Lucknow Super Giants</option>
                    <option value="Mumbai Indians">Mumbai Indians</option>
                    <option value="Punjab Kings">Punjab Kings</option>
                    <option value="Rajasthan Royals">Rajasthan Royals</option>
                    <option value="Royal Challengers Bengaluru">Royal Challengers Bengaluru</option>
                    <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
                </select>
                <button type="submit">Register</button>
            </form>
        </section>
        <section id="predictor-game">
            <h2>Predictor Game</h2>
            <form>
                <label for="match">Select Match:</label>
                <input type="text" id="match" name="match" required>
                <label for="prediction">Your Prediction:</label>
                <input type="text" id="prediction" name="prediction" required>
                <button type="submit">Submit Prediction</button>
            </form>
        </section>
        <section id="leaderboard">
            <h2>Leaderboard</h2>
            <p>Display leaderboard here...</p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
