<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPredict - Cricket Predictor Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to CricPredict!</h1>
        <p>Predict the outcome of your favorite cricket matches.</p>
    </header>
    <main>
        <section>
            <h2>Make your prediction</h2>
            <form id="prediction-form">
                <label for="match">Match:</label>
                <input type="text" id="match" name="match" required>
                <label for="winner">Winner:</label>
                <select id="winner" name="winner" required>
                    <option value="team1">Team 1</option>
                    <option value="team2">Team 2</option>
                </select>
                <button type="submit">Submit Prediction</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 CricPredict. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
